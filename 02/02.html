<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>독도 탐험 인터렉티브 사전</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
        .modal-active { overflow: hidden; }
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <!-- Top Navigation Bar -->
        <div class="flex justify-start mb-6">
            <a href="../index.html" class="flex items-center gap-2 px-4 py-2 bg-white rounded-xl shadow-sm border border-slate-200 text-slate-600 hover:text-blue-600 hover:border-blue-200 transition-all font-medium group">
                <i class="fa-solid fa-house group-hover:scale-110 transition-transform"></i>
                <span>홈으로</span>
            </a>
        </div>

        <!-- Header -->
        <header class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-bold text-blue-800 mb-2 flex items-center justify-center gap-2">
                <i class="fa-solid fa-book"></i> 독도 탐험 용어 사전
            </h1>
            <p class="text-slate-600">독도의 지리, 역사, 영웅들을 인터렉티브하게 탐험해 보세요!</p>
        </header>

        <!-- Main Content Area -->
        <div id="main-content">
            <!-- Navigation Tabs -->
            <div class="flex flex-wrap justify-center gap-2 mb-8" id="category-tabs">
                <button data-cat="all" class="cat-btn px-4 py-2 rounded-full text-sm font-medium transition-all bg-blue-600 text-white shadow-md">전체보기</button>
                <button data-cat="geography" class="cat-btn px-4 py-2 rounded-full text-sm font-medium transition-all bg-white text-slate-600 hover:bg-slate-100">지리와 자원</button>
                <button data-cat="history" class="cat-btn px-4 py-2 rounded-full text-sm font-medium transition-all bg-white text-slate-600 hover:bg-slate-100">역사 기록</button>
                <button data-cat="guardians" class="cat-btn px-4 py-2 rounded-full text-sm font-medium transition-all bg-white text-slate-600 hover:bg-slate-100">독도의 영웅</button>
                <button data-cat="legal" class="cat-btn px-4 py-2 rounded-full text-sm font-medium transition-all bg-white text-slate-600 hover:bg-slate-100">법과 갈등</button>
                <button id="start-quiz-btn" class="px-4 py-2 rounded-full text-sm font-bold bg-rose-500 text-white shadow-md hover:bg-rose-600 flex items-center gap-1">
                    <i class="fa-solid fa-circle-question"></i> 퀴즈 풀기
                </button>
            </div>

            <!-- Grid Layout -->
            <div id="terms-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Items will be injected here -->
            </div>
        </div>

        <!-- Footer -->
        <footer class="mt-12 text-center text-slate-400 text-xs">
            <p>© 독도 탐험 사전 - 우리 땅 독도를 사랑합시다.</p>
        </footer>
    </div>

    <!-- Modal Backdrop -->
    <div id="modal-backdrop" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div id="modal-content" class="bg-white w-full max-w-md rounded-3xl overflow-hidden shadow-2xl fade-in">
            <!-- Modal Body injected by JS -->
        </div>
    </div>

    <script>
        const data = [
            { id: 1, category: 'geography', categoryName: '지리와 자원', icon: 'fa-map', title: '동도와 서도', content: '독도를 이루는 가장 큰 두 개의 섬입니다. 독도는 이 두 섬과 함께 89개의 작은 바위섬들로 이루어져 있습니다.', color: 'bg-blue-100 text-blue-700' },
            { id: 2, category: 'geography', categoryName: '지리와 자원', icon: 'fa-map', title: '가스 하이드레이트', content: "'불타는 얼음'이라고도 불리는 고체 에너지 자원입니다. 독도 주변에 약 6억 톤(우리 국민이 30년간 쓸 수 있는 양)이 묻혀 있는 보물입니다.", color: 'bg-blue-100 text-blue-700' },
            { id: 3, category: 'geography', categoryName: '지리와 자원', icon: 'fa-map', title: '황금어장', content: '차가운 바닷물(한류)과 따뜻한 바닷물(난류)이 만나는 곳으로, 물고기가 아주 많이 살아서 낚시하기에 최고의 장소입니다.', color: 'bg-blue-100 text-blue-700' },
            { id: 4, category: 'geography', categoryName: '지리와 자원', icon: 'fa-map', title: '오키섬', content: '일본에서 독도와 가장 가까운 섬이지만, 거리가 157.5km나 되어 맑은 날에도 독도가 보이지 않습니다.', color: 'bg-blue-100 text-blue-700' },
            { id: 5, category: 'history', categoryName: '역사 속 기록', icon: 'fa-clock-rotate-left', title: '세종실록지리지', content: '조선 전기에 만들어진 지리지로, "우산(독도)과 무릉(울릉도) 두 섬은 거리가 멀지 않아 날씨가 맑으면 바라볼 수 있다"고 기록되어 있습니다.', color: 'bg-amber-100 text-amber-700' },
            { id: 6, category: 'history', categoryName: '역사 속 기록', icon: 'fa-clock-rotate-left', title: '대한제국 칙령 제41호', content: '고종 황제가 독도를 울릉군의 관할 구역으로 공식 선포하여, 독도가 우리 땅임을 국내외에 확실히 알린 문서입니다.', color: 'bg-amber-100 text-amber-700' },
            { id: 7, category: 'history', categoryName: '역사 속 기록', icon: 'fa-clock-rotate-left', title: '태정관 지령', content: '당시 일본 최고 국가기관인 태정관이 "울릉도와 독도는 일본과 관계가 없음을 명심하라"고 공식적으로 인정한 아주 중요한 문서입니다.', color: 'bg-amber-100 text-amber-700' },
            { id: 8, category: 'history', categoryName: '역사 속 기록', icon: 'fa-clock-rotate-left', title: '은주시청합기', content: '일본 관리가 기록한 보고서로, 일본의 북서쪽 경계는 오키섬이며 독도와 울릉도는 조선 땅임을 분명히 하고 있습니다.', color: 'bg-amber-100 text-amber-700' },
            { id: 9, category: 'guardians', categoryName: '독도를 지킨 사람들', icon: 'fa-shield-halved', title: '안용복', content: '조선 숙종 때 일본으로 건너가 울릉도와 독도가 조선의 영토임을 일본 정부(막부)로부터 확답받고 돌아온 용감한 어부입니다.', color: 'bg-green-100 text-green-700' },
            { id: 10, category: 'guardians', categoryName: '독도를 지킨 사람들', icon: 'fa-shield-halved', title: '독도의용수비대', content: '6.25 전쟁 직후 혼란한 틈을 타 일본이 독도에 들어오려 하자, 홍순칠을 비롯한 민간인들이 스스로 조직하여 독도를 지킨 단체입니다.', color: 'bg-green-100 text-green-700' },
            { id: 11, category: 'guardians', categoryName: '독도를 지킨 사람들', icon: 'fa-shield-halved', title: '최종덕', content: '1968년부터 독도에 살기 시작하여 1981년 주민등록을 옮긴 독도 최초의 주민 할아버지입니다.', color: 'bg-green-100 text-green-700' },
            { id: 12, category: 'guardians', categoryName: '독도를 지킨 사람들', icon: 'fa-shield-halved', title: '독도경비대', content: '현재 독도에 머물며 24시간 우리 땅 독도를 든든하게 지키고 있는 경찰관 형들입니다.', color: 'bg-green-100 text-green-700' },
            { id: 13, category: 'legal', categoryName: '법과 갈등', icon: 'fa-scale-balanced', title: '영해', content: '나라의 주권이 미치는 바다의 범위로, 해안선에서 12해리(약 22km)까지를 말합니다.', color: 'bg-purple-100 text-purple-700' },
            { id: 14, category: 'legal', categoryName: '법과 갈등', icon: 'fa-scale-balanced', title: '배타적 경제수역 (EEZ)', content: '바다 자원을 탐사하고 개발할 수 있는 권리가 있는 구역으로, 해안선에서 200해리(약 370km)까지의 범위를 말합니다.', color: 'bg-purple-100 text-purple-700' },
            { id: 15, category: 'legal', categoryName: '법과 갈등', icon: 'fa-scale-balanced', title: '평화선 (이승만 라인)', content: '1952년 우리 바다의 자원을 보호하고 독도 영유권을 확실히 하기 위해 선포한 해상 경계선입니다.', color: 'bg-purple-100 text-purple-700' },
            { id: 16, category: 'legal', categoryName: '법과 갈등', icon: 'fa-scale-balanced', title: '실효적 지배', content: '우리가 실제로 독도에 살면서 등대를 세우고, 군대를 보내 지키는 등 국가로서의 권리를 직접 행사하고 있다는 뜻입니다.', color: 'bg-purple-100 text-purple-700' }
        ];

        const quizData = [
            { question: "'불타는 얼음'이라고 불리며 독도 주변에 많이 묻혀 있는 에너지 자원은?", options: ['석탄', '석유', '가스 하이드레이트', '천연가스'], answer: 2 },
            { question: "독도를 울릉군의 관할 구역으로 공식 선포한 고종 황제의 문서는?", options: ['세종실록지리지', '대한제국 칙령 제41호', '삼국사기', '팔도총도'], answer: 1 },
            { question: "일본 최고 국가기관이 '독도는 일본과 관계없음'을 인정한 문서는?", options: ['태정관 지령', '오키문서', '신창전시', '은주시청합기'], answer: 0 },
            { question: "독도에 살기 시작해 주민등록까지 옮긴 최초의 주민 할아버지는?", options: ['안용복', '홍순칠', '최종덕', '이승만'], answer: 2 }
        ];

        let currentCategory = 'all';
        let currentQuizIndex = 0;
        let quizScore = 0;

        const grid = document.getElementById('terms-grid');
        const modalBackdrop = document.getElementById('modal-backdrop');
        const modalContent = document.getElementById('modal-content');
        const mainContent = document.getElementById('main-content');

        // Render functions
        function renderGrid() {
            const filtered = currentCategory === 'all' ? data : data.filter(item => item.category === currentCategory);
            grid.innerHTML = filtered.map(item => `
                <div onclick="openModal(${item.id})" class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm hover:shadow-md transition-all cursor-pointer group flex items-start gap-4 fade-in">
                    <div class="p-3 rounded-xl ${item.color} flex-shrink-0 group-hover:scale-110 transition-transform">
                        <i class="fa-solid ${item.icon} text-xl"></i>
                    </div>
                    <div class="flex-grow">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-xs font-semibold uppercase tracking-wider opacity-60">${item.categoryName}</span>
                            <i class="fa-solid fa-chevron-right text-xs text-slate-300 group-hover:text-slate-600"></i>
                        </div>
                        <h3 class="text-lg font-bold text-slate-800">${item.title}</h3>
                        <p class="text-slate-500 text-sm line-clamp-2 mt-1">${item.content}</p>
                    </div>
                </div>
            `).join
